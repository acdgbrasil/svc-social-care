name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Build and tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Swift
        uses: swift-actions/setup-swift@7591e4f04c00624cb043783da51a7fd6ee0a6bf6 # v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test

  kodus-review:
    name: Kodus AI Review
    if: github.event_name == 'pull_request'
    uses: acdgbrasil/.github/.github/workflows/reusable-kodus-review.yml@main
    with:
      fail_on: critical
    secrets:
      KODUS_TEAM_KEY: ${{ secrets.KODUS_TEAM_KEY }}
