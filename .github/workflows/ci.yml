name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read
  packages: read

jobs:
  validate:
    name: Build and tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@7ca6abe6b3b0e8b5421b88be48feee39cbf52c6a # v2
        with:
          swift-version: "6.2"

      - name: Show Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build (release)
        run: swift build -c release

      - name: Run tests
        run: swift test

  kodus-review:
    name: Kodus AI Review
    if: github.event_name == 'pull_request'
    uses: acdgbrasil/.github/.github/workflows/reusable-kodus-review.yml@main
    with:
      fail_on: critical
    secrets:
      KODUS_TEAM_KEY: ${{ secrets.KODUS_TEAM_KEY }}
