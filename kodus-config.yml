version: '1.2'

summary:
  generatePRSummary: true
  customInstructions: >
    Summarize changes by bounded context (Registry, Assessment, Care, Protection, Configuration).
    Highlight any domain model changes, new use cases, migration changes, and security-related modifications.
  behaviourForExistingDescription: concatenate

ignorePaths:
  - .build/
  - .swiftpm/
  - Package.resolved
  - '*.lock'
  - .env
  - .env.*
  - docker-compose.yml
  - Dockerfile
  - coverage/
  - scripts/
  - handbook/
  - docs/

baseBranches: []

reviewOptions:
  security: true
  code_style: true
  kody_rules: true
  refactoring: true
  error_handling: true
  maintainability: true
  potential_issues: true
  documentation_and_comments: false
  performance_and_optimization: true
  business_logic: true

suggestionControl:
  groupingMode: full
  limitationType: pr
  maxSuggestions: 9
  severityLevelFilter: medium

ignoredTitleKeywords:
  - chore
  - docs
  - ci

automatedReviewActive: true
pullRequestApprovalActive: false
isRequestChangesActive: false
llmGeneratedMemoriesRequireApproval: false
